{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <form method="POST" action="{{ url_for('login') }}" class="card shadow-lg border-0 p-4 rounded-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">🔐 Connexion Administrateur</h3>
                <p class="text-muted mb-0">
                    COUD Medical Claims System
                </p>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Adresse email</label>
                <input
                    name="email"
                    type="email"
                    class="form-control"
                    placeholder="admin@coud.sn"
                    value="{{ remembered_email }}"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mot de passe</label>
                <input
                    name="password"
                    type="password"
                    class="form-control"
                    placeholder="Mot de passe"
                    required
                >
            </div>

            <div class="form-check mb-3">
                <input
                    class="form-check-input"
                    type="checkbox"
                    name="remember_me"
                    id="remember_me"
                >
                <label class="form-check-label" for="remember_me">
                    Se souvenir de moi
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3">
                Se connecter
            </button>
        </form>
    </div>
</div>

{% endblock %}
