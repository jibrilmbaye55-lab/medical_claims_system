<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUD Medical Claims</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 45%, #dbeafe 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== NAVBAR ===== */
        .navbar-modern {
            background: linear-gradient(90deg, #2563eb, #0ea5e9);
            box-shadow: 0 8px 30px rgba(37,99,235,0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* ===== MAIN CARD ===== */
        .main-card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
            animation: fadeSlide .7s ease;
        }

        /* ===== BUTTONS ===== */
        .btn-modern {
            background: linear-gradient(90deg, #2563eb, #0ea5e9);
            border: none;
            border-radius: 14px;
            padding: 12px 24px;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 25px rgba(14,165,233,0.25);
            transition: all .3s ease;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(14,165,233,0.35);
        }

        /* ===== FORMS ===== */
        .form-control, .form-select {
            border-radius: 14px;
            min-height: 52px;
            border: 1px solid #dbeafe;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
            transition: all .3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
        }

        textarea.form-control {
            min-height: 180px;
        }

        /* ===== KPI CARDS ===== */
        .kpi-card {
            transition: all .35s ease;
            animation: floatCard 4s ease-in-out infinite;
            border-radius: 20px;
        }

        .kpi-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(37,99,235,.15);
        }

        /* ===== TABLE ===== */
        .table-row-animated {
            transition: all .3s ease;
        }

        .table-row-animated:hover {
            transform: scale(1.01);
            background: rgba(219,234,254,.35);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes floatCard {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR INSTITUTIONNELLE ===== -->
<nav class="navbar navbar-dark navbar-modern px-4 py-3">
    <div class="d-flex align-items-center gap-3">
        <img src="{{ url_for('static', filename='assets/logo_coud.png') }}"
             alt="COUD Logo"
             style="height:48px; width:auto; filter:drop-shadow(0 4px 10px rgba(0,0,0,.2));">

        <div>
            <div class="fw-bold fs-3">COUD Medical Reclamations</div>
            <small class="text-white-50">Département Médical • Laboratoire</small>
        </div>
    </div>
</nav>

<!-- ===== CONTENT ===== -->
<div class="container py-5">
    {% block content %}{% endblock %}
</div>

<!-- JS GLOBAL -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
